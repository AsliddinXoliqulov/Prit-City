            </header>
            <section class="card">
                <div class="card-header">
                    <div class="card-title">
                        Profil
                        <span class="badge-soft mono" id="profileRoleBadge">user</span>
                    </div>
                    <div class="small" id="profileInfo">Yuklanmoqda...</div>
                </div>

                <div id="profileState" class="empty-row">Yuklanmoqda...</div>

                <div id="profileContent" class="profile-layout hidden">
                    <div class="profile-main">
                        <div class="profile-hero">
                            <div style="outline: hidden;" class="profile-avatar" id="profileAvatar"></div>
                            
                            <div class="profile-hero-text">
                                <h1 id="profileNameText" class="profile-name">Foydalanuvchi</h1>
                                <div id="profileEmailText" class="profile-email">email@gmail.com</div>
                            </div>
                        </div>

                        <div class="profile-box">
                            <div class="section-title">Shaxsiy ma'lumotlar</div>

                            <form id="profileForm" class="form-grid">
                                <div class="field">
                                    <label for="fullNameInput">Ism</label>
                                    <input id="fullNameInput" type="text" placeholder="Ismingiz" />
                                </div>

                                <div class="field">
                                    <label for="phoneInput">Telefon</label>
                                    <input id="phoneInput" type="text" placeholder="+998..." />
                                </div>

                                <div class="field">
                                    <label for="emailInput">Email</label>
                                    <input id="emailInput" type="text" disabled />
                                </div>

                                <div class="field">
                                    <label for="lastLoginInput">Oxirgi login</label>
                                    <input id="lastLoginInput" type="text" disabled />
                                </div>

                                <div class="field">
                                    <label for="createdAtInput">Ro‘yxatdan o‘tgan vaqt</label>
                                    <input id="createdAtInput" type="text" disabled />
                                </div>

                                <div class="field">
                                    <label for="avatarInput">Avatar rasm</label>
                                    <input id="avatarInput" type="file" accept="image/png, image/jpeg, image/webp">
                                </div>

                                <div class="form-row-full profile-form-footer">
                                    <div id="profileStatus" class="status-text"></div>

                                    <div class="profile-form-actions">
                                        <button id="saveProfileBtn" class="btn-primary" type="submit">
                                            <i class="fa-regular fa-floppy-disk"></i> Saqlash
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>

                    <aside class="profile-side">
                        <div class="profile-box quick-box">
                            <div class="section-title">Tezkor bo‘limlar</div>

                            <div class="quick-actions">
                                <a class="btn-secondary quick-link" href="./my-orders.html">
                                    <i class="fa-solid fa-bag-shopping"></i>
                                    Buyurtmalarim
                                </a>

                                <a class="btn-secondary quick-link" href="./liked.html">
                                    <i class="fa-regular fa-heart"></i>
                                    Liked mahsulotlar
                                </a>

                                <!-- <a class="btn-secondary quick-link" href="../../index.html">
                                    <i class="fa-solid fa-key"></i>
                                    Parolni tiklash
                                </a> -->

                                <button id="logoutBtn" class="btn-danger quick-link" type="button">
                                    <i class="fa-solid fa-right-from-bracket"></i>
                                    Chiqish
                                </button>
                            </div>
                        </div>

                        <!-- <div class="profile-box profile-summary-box">

                            <div class="summary-row">

                            </div>
                        </div> -->
                    </aside>
                </div>
            </section>
