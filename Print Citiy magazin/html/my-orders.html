<!DOCTYPE html>
<html lang="uz" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <title>Mening buyurtmalarim</title>
    <link rel="shortcut icon" href="../Base/image/favicon.svg" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="../../Base/css/base.css">
    <link rel="stylesheet" href="../css/my-orders.css">
</head>

<body>
    <div class="app-shell">
        <div class="app-content">
            <header class="header">
                <div class="title-group">
                    <div class="title-row">
                        <div class="title-logo">
                            <img src="../../Base/image/hero.svg" alt="logo">
                        </div>
                        <div class="title">
                            <span class="highlight">Print City</span>
                        </div>
                    </div>
                </div>

                <div class="header-actions">
                    <button id="themeToggle" type="button" class="btn-secondary">
                        <i class="fa-solid fa-lightbulb"></i>
                    </button>

                    <a class="btn-secondary" href="./index.html">
                        <i class="fa-solid fa-house"></i> Bosh sahifa
                    </a>

                    <a class="btn-secondary" href="./profile.html">
                        <i class="fa-regular fa-user"></i> Profil
                    </a>

                    <a class="btn-primary" href="./cart.html">
                        <i class="fa-solid fa-cart-shopping"></i> Savat
                        <span id="cartCountBadge" class="header-count light">0</span>
                    </a>
                </div>
            </header>

            <section class="card">
                <div class="card-header">
                    <div class="card-title">
                        Mening buyurtmalarim
                        <span class="badge-soft mono" id="ordersCount">0 ta</span>
                    </div>
                    <div class="small" id="ordersInfo">Yuklanmoqda...</div>
                </div>

                <div class="orders-top">
                    <div class="tabs">
                        <div class="tab-wrap">
                            <button class="tab-btn active" data-tab="" type="button">Barchasi</button>
                        </div>

                        <div class="tab-wrap">
                            <button class="tab-btn" data-tab="1" type="button">Yangi</button>
                        </div>

                        <div class="tab-wrap">
                            <button class="tab-btn" data-tab="2" type="button">Jarayonda</button>
                        </div>

                        <div class="tab-wrap">
                            <button class="tab-btn" data-tab="3" type="button">Yakunlangan</button>
                        </div>

                        <div class="tab-wrap">
                            <button class="tab-btn danger-tab" data-tab="0" type="button">Bekor qilingan</button>
                        </div>
                    </div>

                    <div class="orders-search">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input id="searchInput" type="text" placeholder="Buyurtma ID yoki mahsulot nomi..." />
                    </div>
                </div>

                <div id="ordersState" class="empty-row">Yuklanmoqda...</div>
                <div id="ordersList" class="orders-list hidden"></div>
            </section>
        </div>
    </div>

    <script type="module" src="../../Base/js/base.js"></script>
    <script type="module" src="../js/my-orders.js"></script>
</body>

</html>
