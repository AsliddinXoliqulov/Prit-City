<!DOCTYPE html>
<html lang="uz" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <title>Mening buyurtmalarim</title>
    <link rel="shortcut icon" href="../../Base/image/favicon.svg" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="../../Base/css/base.css">
    <link rel="stylesheet" href="../css/my-orders.css">
</head>
<body>
            <header class="header">
            
                <div class="title-group">
                    <div class="title-row">
                        <div class="title-logo">
                            <img src="../../Base/image/hero.svg" alt="Print City">
                        </div>
            
                        <div class="title">
                            <span class="highlight">Print City</span>
                        </div>
                    </div>
                </div>
            
            
                <div class="nav-group">
            
                    <button id="themeToggle" type="button" class="btn-secondary icon-btn">
                        <i class="fa-solid fa-moon"></i>
                    </button>
            
                    <button class="btn-secondary menu-toggle icon-btn" id="menuToggle" type="button">
                        <i class="fa-solid fa-bars"></i>
                    </button>
            
                    <nav class="header-actions" id="headerActions">
            
                        <a class="btn-secondary" href="./product.html">
                            <i class="fa-solid fa-house"></i>
                            <span>Bosh sahifa</span>
                        </a>
            
                        <a class="btn-secondary" href="./cart.html">
                            <i class="fa-solid fa-cart-shopping"></i>
                            <span>Savat</span>
                        </a>
            
                        <a id="profileLink" class="btn-primary" href="./profile.html">
                            <i class="fa-regular fa-user"></i>
                            <span>Profil</span>
                        </a>
            
                    </nav>
            
                </div>
            
            </header>

            <section class="card">
                <div class="card-header">
                    <div class="card-title">
                        <span style="display: none;" id="cartCountBadge" class="header-count">0</span>
                        Mening buyurtmalarim
                        <span class="badge-soft mono" id="ordersCount">0 ta</span>
                    </div>
                    <div class="small" style="display: none;" id="ordersInfo">Yuklanmoqda...</div>
                </div>

                <div class="orders-top">
                    <div class="tabs">
                        <div class="tab-wrap">
                            <button class="tab-btn active" data-tab="" type="button">Barchasi</button>
                        </div>

                        <div class="tab-wrap">
                            <button class="tab-btn" data-tab="1" type="button">Yangi</button>
                        </div>

                        <div class="tab-wrap">
                            <button class="tab-btn" data-tab="2" type="button">Jarayonda</button>
                        </div>

                        <div class="tab-wrap">
                            <button class="tab-btn" data-tab="3" type="button">Yakunlangan</button>
                        </div>

                        <div class="tab-wrap">
                            <button class="tab-btn danger-tab" data-tab="0" type="button">Bekor qilingan</button>
                        </div>
                    </div>

                    <div class="orders-search">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input id="searchInput" type="text" placeholder="Buyurtma ID yoki mahsulot nomi..." />
                    </div>
                </div>

                <div id="ordersState" class="empty-row">Yuklanmoqda...</div>
                <div id="ordersList" class="orders-list hidden"></div>
            </section>

    <script type="module" src="../../Base/js/base.js"></script>
    <script type="module" src="../js/my-orders.js"></script>
</body>

</html>
